  '/model/{id}':
    get:
      tags:
        - Endpoints
      summary: Get a single model by its ID
      description: 'Gets one model. Please note that any use of a creative commons model requires attribution by law. You can included the provided attribution text below, ideally with the links as that''s required by the licence, otherwise the model title and creator will do. Orbit is the viewing rotation set by the creator and is expressed in radians.'
      operationId: GetModel
      parameters:
        - name: id
          in: path
          description: Model ID
          required: true
          style: simple
          schema:
            type: string
            example: 52s3JpUSjmX
      responses:
        '200':
          description: OK
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/Model'
              examples:
                default:
                  value:
                    ID: 52s3JpUSjmX
                    Title: Fish
                    Description: '#gill #marine #ocean'
                    Attribution: 'Fish by jeremy, https://poly.pizza/m/52s3JpUSjmX. Licence at https://creativecommons.org/licenses/by/3.0'
                    Thumbnail: 'https://static.poly.pizza/2e6df40d-305c-4ebe-b61a-dcb2df03fb03.webp'
