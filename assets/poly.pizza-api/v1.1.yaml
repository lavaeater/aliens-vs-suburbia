openapi: 3.0.0
info:
  version: '1.1'
  title: Poly Pizza API
  description: 'Welcome to the Poly Pizza API docs! 
  
  To get started you''ll need to head to the [settings page](https://poly.pizza/settings/api) and create an app. Copy the API key down somewhere safe and treat it like a password (i.e. don''t include it in public git repos). Requests are authenticated by including your key in an x-auth-token header. 
  

  There''s an official unity package with examples [here](https://github.com/Chikanz/pizzabox). If you''re using the API in a public app (especially a web app) consider using the API on a server instead of the client as your API key could easily be sniffed and stolen. You can also cache responses much more efficiently. Something like cloudflare workers, heroku or AWS lambda will do. All have huge free tiers. Example coming soon I promise!!! 


  The v1 API has been depricated since it was a bit stinky and out of spec in some places. v1.1 is almost exactly the same but has extra validation and extra props on the list endpoint. 


  Feel free to shoot me an email if you run into any bugs, have any suggestions or make something cool with the API :)'
  contact:
    email: hi@duck.pizza
servers:
  - url: 'https://api.poly.pizza/v1.1'
