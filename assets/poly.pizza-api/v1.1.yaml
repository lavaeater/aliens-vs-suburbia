  /search:
    get:
      tags:
        - Endpoints
      summary: Search all models with just filters
      description: Note that this endpoint needs at least one filter
      operationId: SearchFilters
      parameters:
        - name: Limit
          in: query
          description: '(Optional) How many results to return. Default is 32, Max is 32'
          schema:
            type: integer
        - name: Page
          in: query
          description: '(Optional) What page of results to get. indexed at 0, multiple requests will need to be made to get more than 32 models.'
          schema:
            type: integer
        - name: Category
          in: query
          description: '(Optional) Filter serch by model catagory. Catagory is passed as an index using the following list. Food & Drink = 0, Clutter = 1, Weapons = 2, Transport = 3, Furniture & Decor = 4, Objects = 5, Nature = 6, Animals = 7, Buildings = architecture = 8, People & Characters = 9, Scenes & Levels = 10, Other = 11'
          schema:
            type: integer
        - name: License
          in: query
          description: '(Optional) Filter search by model Licence. Pass 0 to only get CC-BY models, and 1 to get CC0 models'
          schema:
            type: integer
        - name: Animated
          in: query
          description: (Optional) Set as 1 to only get animated models
          schema:
            type: integer
      responses:
