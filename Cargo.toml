#cargo-features = ["codegen-backend"]

[package]
name = "aliens-vs-suburbia"
version = "0.1.0"
edition = "2024"
exclude = ["dist", "build", "assets", "credits"]

[dependencies]
bevy = { version = "0.18.1", default-features = false, features = [
    "bevy_animation",
    "bevy_asset",
    "bevy_state",
    "bevy_color",
    "bevy_gilrs",
    "bevy_scene",
    "bevy_winit",
    "bevy_core_pipeline",
    "bevy_pbr",
    "bevy_gltf",
    "bevy_render",
    "bevy_sprite",
    "bevy_text",
    "bevy_ui",
    "multi_threaded",
    "png",
    "hdr",
    "x11",
    "bevy_gizmos",
    "tonemapping_luts",
    "smaa_luts",
    "default_font",
    "webgl2",
    "sysinfo_plugin",
    "bevy_dev_tools"
] }
bevy_reflect = { version = "0.18.1", default-features = false, features = ["default"] }
bevy_reflect_derive = "0.18.1"
bevy_rand = "0.14.2"
avian3d = "0.6.1"
big-brain = "0.22.0"
flagset = "0.4.4"
pathfinding = "4.6.0"
itertools = "0.14.0"
bevy_mod_outline = "0.12.0"
bevy-inspector-egui = "0.36.0"
bevy_atmosphere = "0.13.0"
image = "0.25.6"
noise = "0.9.0"
bevy_panorbit_camera = "0.34.0"
# Enable max optimizations for dependencies, but not for our code:
[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true