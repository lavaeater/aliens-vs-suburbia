cargo-features = ["codegen-backend"]

[package]
name = "aliens-vs-suburbia"
version = "0.1.0"
edition = "2024"
exclude = ["dist", "build", "assets", "credits"]

[dependencies]
bevy = "0.15.3"
bevy_rand = "0.9.0"
avian3d = "0.2.1"
big-brain = "0.22.0"
rand_chacha = "0.9.0"
flagset = "0.4.4"
serde = "1.0.193"
serde_json = "1.0.108"
pathfinding = "4.6.0"
itertools = "0.14.0"
belly = { git="https://github.com/lavaeater/belly/", branch="bevy@0.15.3" }
bevy_mod_outline = "0.9.1"
bevy_video_glitch = "0.2.0"
bevy-inspector-egui = "0.30.0"
bevy_atmosphere = "0.12.2"
rand = "0.9.1"
image = "0.25.6"
noise = "0.9.0"
nalgebra = "0.33.2"
bitintr = "0.3.0"
palette = "0.7.3"
bevy_panorbit_camera = "0.25.0"
bevy_hanabi = "0.15.0"
# Enable max optimizations for dependencies, but not for our code:
[profile.dev.package."*"]
opt-level = 3
codegen-backend = "cranelift"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true